# Build Tauri installers and attach them to a GitHub Release.
#
# Trigger: publish a GitHub Release (or run manually via workflow_dispatch).
# Requires: Settings → Actions → Workflow permissions → Read and write.

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Static HTML frontend (no Node build step).
      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          # When the workflow is started by a published Release, attach to it.
          releaseId: ${{ github.event.release.id }}
          # Manual runs create/update a draft release tagged with the app version.
          tagName: ${{ github.event_name == 'workflow_dispatch' && 'v__VERSION__' || '' }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && 'Grok Usage Monitor v__VERSION__' || '' }}
          releaseBody: |
            Desktop installers for Grok Usage Monitor.

            - Windows: `.msi` / `.exe` (NSIS)
            - macOS: `.dmg` / `.app` (unsigned unless signing secrets are configured)
            - Linux: `.deb` / `.AppImage`
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: false
          args: ${{ matrix.args }}
