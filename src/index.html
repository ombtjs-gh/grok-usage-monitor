<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grok Usage</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header class="chrome" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="singularity" data-tauri-drag-region aria-hidden="true"></span>
          <div class="brand-copy" data-tauri-drag-region>
            <div class="brand-title" data-tauri-drag-region>Grok</div>
            <div id="account-label" class="brand-sub" data-tauri-drag-region>Usage</div>
          </div>
        </div>
        <div class="chrome-actions">
          <button
            id="btn-lang"
            class="icon-btn lang-btn"
            type="button"
            title="日本語に切替"
            aria-label="Switch language"
          >
            <span id="lang-code">JA</span>
          </button>
          <button id="btn-refresh" class="icon-btn" data-i18n-title="refresh" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path
                fill="currentColor"
                d="M13.5 8a5.5 5.5 0 1 1-1.4-3.6l.9.9V2.5h-2.8l1.1 1.1A6.5 6.5 0 1 0 14.5 8h-1z"
              />
            </svg>
          </button>
          <button id="btn-minimize" class="icon-btn" data-i18n-title="minimize" title="Minimize" aria-label="Minimize">–</button>
          <button id="btn-close" class="icon-btn close" data-i18n-title="close" title="Hide to tray" aria-label="Close">×</button>
        </div>
      </header>

      <main class="body">
        <section id="empty-state" class="card empty hidden">
          <div class="empty-mark" aria-hidden="true"></div>
          <p class="empty-title" data-i18n="emptyTitle">Add an account</p>
          <p class="empty-hint" data-i18n="emptyHint">Import Grok CLI auth, or sign in with the browser</p>
          <div class="btn-row">
            <button id="btn-import" class="btn primary" data-i18n="importCli">CLI import</button>
            <button id="btn-login" class="btn ghost" data-i18n="login">Log in</button>
          </div>
        </section>

        <section id="usage-panel" class="card usage hidden">
          <div class="usage-hero">
            <div class="usage-pct-wrap">
              <span id="usage-pct" class="usage-pct">--</span>
              <span class="usage-unit">%</span>
            </div>
            <div class="usage-track" aria-hidden="true">
              <span id="usage-bar-fill" class="usage-fill"></span>
            </div>
          </div>

          <div id="breakdown" class="breakdown"></div>

          <div class="meta-grid">
            <div class="meta-cell">
              <span class="meta-label" data-i18n="reset">Reset</span>
              <span id="reset-text" class="meta-value">----/--/-- --:--</span>
            </div>
            <div class="meta-cell">
              <span class="meta-label" data-i18n="lastUpdated">Updated</span>
              <span id="fetched-text" class="meta-value">----/--/-- --:--</span>
            </div>
          </div>
        </section>

        <section class="card accounts" data-i18n-aria="accounts" aria-label="Accounts">
          <div class="accounts-head">
            <span class="accounts-title" data-i18n="accounts">Accounts</span>
            <div class="accounts-tools">
              <div class="sort-group" role="group" data-i18n-aria="sortGroup" aria-label="Sort accounts">
                <button
                  type="button"
                  id="sort-usage"
                  class="sort-btn"
                  data-sort="usage"
                  data-i18n-title="sortUsage"
                  title="Sort by usage"
                >
                  % <span class="sort-arrow" aria-hidden="true"></span>
                </button>
                <button
                  type="button"
                  id="sort-reset"
                  class="sort-btn"
                  data-sort="reset"
                  data-i18n-title="sortReset"
                  title="Sort by reset"
                >
                  <span data-i18n="sortResetShort">Reset</span>
                  <span class="sort-arrow" aria-hidden="true"></span>
                </button>
              </div>
              <div class="accounts-actions">
                <button id="btn-import-2" class="btn tiny" data-i18n="importShort" data-i18n-title="importCli" title="CLI import">Import</button>
                <button id="btn-login-2" class="btn tiny" data-i18n-title="login" title="Log in">+</button>
              </div>
            </div>
          </div>
          <ul id="account-list" class="account-list"></ul>
        </section>

        <section class="card toolbar">
          <label class="tool" data-i18n-title="opacity" title="Opacity">
            <span class="tool-label" data-i18n="opacity">Opacity</span>
            <input id="opacity" type="range" min="20" max="100" value="92" />
            <span id="opacity-val" class="tool-val">92%</span>
          </label>
          <label class="tool check" data-i18n-title="alwaysOnTop" title="Always on top">
            <input id="always-on-top" type="checkbox" checked />
            <span class="tool-label" data-i18n="top">Top</span>
          </label>
          <label class="tool" data-i18n-title="interval" title="Refresh interval">
            <span class="tool-label" data-i18n="every">Every</span>
            <select id="interval" data-i18n-aria="interval" aria-label="Refresh interval">
              <option value="5">5m</option>
              <option value="10" selected>10m</option>
              <option value="15">15m</option>
              <option value="30">30m</option>
              <option value="60">60m</option>
            </select>
          </label>
        </section>
      </main>

      <footer class="foot">
        <p id="status" class="status" role="status"></p>
      </footer>
    </div>
  </body>
</html>
